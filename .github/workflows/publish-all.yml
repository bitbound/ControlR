name: Production Release
run-name: "Production Release (Run ID: ${{ inputs.run_id || 'latest build' }})"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Build workflow run ID (leave empty to use latest)"
        required: false
        type: string
      prerelease:
        description: "Mark GitHub release as pre-release"
        required: true
        type: boolean
        default: false
      use_local_storage:
        description: "Use local storage"
        required: false
        type: boolean
        default: true
      use_self_hosted_runners:
        description: "Use self-hosted runners"
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: write

jobs:
  publish-docker:
    name: Deploy to Docker Hub
    uses: ./.github/workflows/publish-docker.yml
    secrets: inherit
    with:
      docker_tag: latest
      run_id: ${{ inputs.run_id }}
      use_local_storage: ${{ inputs.use_local_storage }}
      use_self_hosted_runners: ${{ inputs.use_self_hosted_runners }}
    permissions:
      actions: read
      contents: read

  publish-github:
    name: Create GitHub Release
    needs: publish-docker
    uses: ./.github/workflows/publish-github.yml
    secrets: inherit
    with:
      prerelease: ${{ inputs.prerelease }}
      run_id: ${{ inputs.run_id }}
      use_local_storage: ${{ inputs.use_local_storage }}
      use_self_hosted_runners: ${{ inputs.use_self_hosted_runners }}
    permissions:
      contents: write

  publish-nugets:
    name: Publish NuGet Packages
    needs: publish-docker
    uses: ./.github/workflows/publish-nugets.yml
    secrets: inherit
    with:
      run_id: ${{ inputs.run_id }}
      use_local_storage: ${{ inputs.use_local_storage }}
      use_self_hosted_runners: ${{ inputs.use_self_hosted_runners }}
    permissions:
      actions: read
      contents: read
      id-token: write
