name: Run Tests

on:
  workflow_call:
    inputs:
      use_self_hosted_runners:
        description: Use self-hosted runners.
        required: false
        default: false
        type: boolean

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  run-linux-tests:
    name: Linux Tests
    runs-on: ${{ inputs.use_self_hosted_runners && fromJson('["self-hosted","Linux"]') || fromJson('["ubuntu-latest"]') }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          clean: true

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Install macOS workload
        run: dotnet workload install macos

      - name: Restore
        run: dotnet restore

      - name: Build Test Projects
        run: |
          $excludedProjects = @(
            "ControlR.DesktopClient.Tests.csproj",
            "ControlR.DesktopClient.Mac.Tests.csproj",
            "ControlR.DesktopClient.Windows.Tests.csproj",
            "ControlR.Web.Server.UITests.csproj"
          )

          $testProjects = Get-ChildItem -Path "Tests" -Recurse -Filter "*.csproj" |
            Where-Object { $_.Name -like "*.Tests.csproj" -and $_.Name -notin $excludedProjects } |
            Sort-Object FullName

          if ($testProjects.Count -eq 0) {
            throw "No platform-agnostic test projects were found under Tests/."
          }

          foreach ($project in $testProjects) {
            Write-Host "Building $($project.FullName)..."
            dotnet build $project.FullName -c Release
            if ($LASTEXITCODE -ne 0) {
              throw "Build failed for $($project.FullName)."
            }
          }

      - name: Run Tests
        run: |
          $excludedProjects = @(
            "ControlR.DesktopClient.Tests.csproj",
            "ControlR.DesktopClient.Mac.Tests.csproj",
            "ControlR.DesktopClient.Windows.Tests.csproj",
            "ControlR.Web.Server.UITests.csproj"
          )

          $testProjects = Get-ChildItem -Path "Tests" -Recurse -Filter "*.csproj" |
            Where-Object { $_.Name -like "*.Tests.csproj" -and $_.Name -notin $excludedProjects } |
            Sort-Object FullName

          foreach ($project in $testProjects) {
            Write-Host "Running $($project.FullName)..."
            dotnet run --project $project.FullName -c Release --no-build --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "Test execution failed for $($project.FullName)."
            }
          }

  run-windows-desktop-tests:
    name: Windows Tests
    runs-on: ${{ inputs.use_self_hosted_runners && fromJson('["self-hosted","Windows"]') || fromJson('["windows-latest"]') }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          clean: true

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Install macOS workload
        run: dotnet workload install macos

      - name: Build Desktop Tests
        run: |
          $testProjects = @(
            "Tests/ControlR.DesktopClient.Tests/ControlR.DesktopClient.Tests.csproj",
            "Tests/ControlR.DesktopClient.Windows.Tests/ControlR.DesktopClient.Windows.Tests.csproj"
          )

          foreach ($project in $testProjects) {
            Write-Host "Building $project..."
            dotnet build $project -c Release
            if ($LASTEXITCODE -ne 0) {
              throw "Build failed for $project."
            }
          }

      - name: Run Desktop Tests
        run: |
          $testProjects = @(
            "Tests/ControlR.DesktopClient.Tests/ControlR.DesktopClient.Tests.csproj",
            "Tests/ControlR.DesktopClient.Windows.Tests/ControlR.DesktopClient.Windows.Tests.csproj"
          )

          foreach ($project in $testProjects) {
            Write-Host "Running $project on Windows..."
            dotnet run --project $project -c Release --no-build --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "Test execution failed for $project."
            }
          }

  run-macos-desktop-tests:
    name: macOS Tests
    runs-on: ${{ inputs.use_self_hosted_runners && fromJson('["self-hosted","macOS"]') || fromJson('["macos-26"]') }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          clean: true

      - name: Setup .NET
        if: inputs.use_self_hosted_runners == false
        uses: ./.github/actions/setup-dotnet

      - name: Install macOS workload
        if: inputs.use_self_hosted_runners == false
        run: dotnet workload install macos

      - name: Build Desktop Tests
        run: |
          $testProjects = @(
            "Tests/ControlR.DesktopClient.Tests/ControlR.DesktopClient.Tests.csproj",
            "Tests/ControlR.DesktopClient.Mac.Tests/ControlR.DesktopClient.Mac.Tests.csproj"
          )

          foreach ($project in $testProjects) {
            Write-Host "Building $project for osx-arm64..."
            dotnet build $project -c Release -r osx-arm64 --self-contained
            if ($LASTEXITCODE -ne 0) {
              throw "Build failed for $project."
            }
          }

      - name: Run Desktop Tests
        run: |
          $testProjects = @(
            "Tests/ControlR.DesktopClient.Tests/ControlR.DesktopClient.Tests.csproj",
            "Tests/ControlR.DesktopClient.Mac.Tests/ControlR.DesktopClient.Mac.Tests.csproj"
          )

          foreach ($project in $testProjects) {
            Write-Host "Running $project on macOS (osx-arm64)..."
            dotnet run --project $project -c Release -r osx-arm64 --self-contained --no-build --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "Test execution failed for $project."
            }
          }
